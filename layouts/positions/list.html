{{ define "main" }}

  <article class="mx-auto max-w-5xl px-6 py-10">
    <header class="mb-10">
      <h1 class="text-4xl font-extrabold text-neutral-900 dark:text-neutral-100">{{ .Title }}</h1>
    </header>

    <div class="contact-card relative overflow-hidden rounded-2xl shadow-sm backdrop-blur-sm" data-scroll-reveal="fade-left" style="background: rgba(239,230,211,0.75); height: 280px;">
      <video
        class="absolute inset-0 h-full w-full object-cover"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true">
        <source src="/img/animations/231177_pingpong.mp4" type="video/mp4">
      </video>
    </div>

    {{ with .Content }}
      <div class="mt-5 max-w-none">{{ . }}</div>
    {{ end }}

    {{ if gt (len .Pages) 0 }}
      <section class="mt-10 space-y-10 w-full">
        {{ range .Pages.ByWeight }}
          {{ partial "article-link/simple.html" . }}
        {{ end }}
      </section>
      {{ partial "pagination.html" . }}
    {{ end }}
  </article>
{{ end }}
