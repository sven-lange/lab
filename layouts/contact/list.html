{{ define "main" }}
  <article class="mx-auto max-w-5xl px-6 py-10">
    <header class="mb-10">
      <h1 class="text-4xl font-extrabold text-neutral-900 dark:text-neutral-100">{{ .Title }}</h1>
      {{ with .Content }}
        <div class="prose mt-5 max-w-none dark:prose-invert">{{ . }}</div>
      {{ end }}
    </header>
  </article>
{{ end }}
